<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DTR Field Survey</title>
<style>
  :root { --brand:#0b6efd; --err:#c62828; --ok:#2e7d32; }
  * { box-sizing:border-box; font-family: system-ui, sans-serif; }
  body { margin:0; background:#f4f6f9; padding:16px; }
  .card { max-width:720px; margin:auto; background:#fff; border-radius:12px;
          box-shadow:0 4px 16px rgba(0,0,0,.06); padding:20px; }
  h1 { font-size:20px; margin:0 0 12px; color:var(--brand); }
  label { display:block; font-weight:600; margin:12px 0 4px; font-size:14px; }
  input, select, textarea { width:100%; padding:10px; border:1px solid #ccd;
          border-radius:8px; font-size:14px; }
  textarea { resize:vertical; min-height:70px; }
  .req::after { content:" *"; color:var(--err); }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  .msg { padding:10px; border-radius:8px; margin-top:12px; font-size:14px; }
  .err { background:#ffebee; color:var(--err); }
  .ok  { background:#e8f5e9; color:var(--ok); }
  button { margin-top:18px; width:100%; padding:14px; border:0;
           background:var(--brand); color:#fff; font-size:16px; border-radius:10px;
           cursor:pointer; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .hint { font-size:12px; color:#666; margin-top:4px; }
  #photoPreview { max-width:100%; border-radius:8px; margin-top:8px; display:none; }
  .hidden { display:none; }
  .pw-wrap { position:relative; }
  .pw-toggle { position:absolute; right:10px; top:50%; transform:translateY(-50%);
               background:none; border:0; padding:0; width:auto; margin:0;
               color:var(--brand); font-size:13px; cursor:pointer; }
  .secondary-btn {
    margin-top: 8px;
    width: 100%;
    padding: 12px;
    border: 2px solid var(--brand);
    background: #fff;
    color: var(--brand);
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
  }
  .secondary-btn:hover { background: #f0f7ff; }
  .success-box {
    padding: 16px;
    border-radius: 10px;
    background: #e8f5e9;
    border: 2px solid var(--ok);
    margin-top: 12px;
    text-align: center;
  }
  .success-box .aesl-code {
    font-size: 22px;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: 1px;
    margin: 8px 0;
    padding: 8px 16px;
    background: #fff;
    border-radius: 8px;
    display: inline-block;
    border: 2px dashed var(--brand);
  }
  .success-box .ref-id {
    font-size: 12px;
    color: #555;
    margin-top: 8px;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--brand);
    color: var(--brand);
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    margin: 6px 0 0 0;
    width: auto;
  }
</style>
</head>
<body>
<div class="card">
  <h1>DTR Field Survey</h1>
  <div id="locStatus" class="msg err">📍 Requesting location permission…</div>
  <button type="button" id="retryLocBtn" class="secondary-btn hidden">🔄 Enable Location & Retry</button>

  <form id="surveyForm" novalidate>

    <label class="req">Access Code</label>
    <div class="pw-wrap">
      <input type="password" name="AccessCode" id="accessCode"
             maxlength="100" autocomplete="off" required
             placeholder="Enter the access code provided by admin" />
      <button type="button" class="pw-toggle" id="pwToggle">Show</button>
    </div>
    <div class="hint">Ask your supervisor if you don't have this code.</div>

    <label class="req">Circle</label>
    <select name="Circle" required></select>

    <label class="req">Division</label>
    <select name="Division" required></select>

    <label class="req">Sub-Division</label>
    <select name="SubDivision" required></select>

    <label class="req">Section</label>
    <input name="Section" maxlength="100" required />

    <label class="req">Name of Substation</label>
    <input name="SubstationName" maxlength="100" required />

    <label class="req">Substation Code</label>
    <input name="SubstationCode" maxlength="100" required />

    <div class="row">
      <div>
        <label class="req">Feeder Name</label>
        <input name="FeederName" maxlength="100" required />
      </div>
      <div>
        <label class="req">Feeder Code</label>
        <input name="FeederCode" maxlength="100" required />
      </div>
    </div>

    <label class="req">Is smart meter installed?</label>
    <select name="IsSmartMeterInstalled" required>
      <option value="">-- Select --</option><option>Yes</option><option>No</option>
    </select>

    <label class="req">Meter Serial No. (Smart / Old Meter)</label>
    <input name="MeterSerialNo" maxlength="100" required />

    <div class="row">
      <div>
        <label class="req">DTR Name</label>
        <input name="DTRName" maxlength="100" required />
      </div>
      <div>
        <label class="req">DTR Code / Structure Code</label>
        <input name="DTRCode" maxlength="100" required />
      </div>
    </div>

    <label class="req">DTR Rating (KVA)</label>
    <input type="number" name="DTRRatingKVA" min="0" max="10000000" step="1" required />

    <label class="req">Is power cable required?</label>
    <select name="IsPowerCableRequired" required>
      <option value="">-- Select --</option><option>Yes</option><option>No</option>
    </select>

    <label class="req">Size of cable (sqmm)</label>
    <input type="number" name="CableSizeSqmm" min="0" max="1000000" step="1" required />

    <label class="req">Quantity of Power cable (meters)</label>
    <input type="number" name="CableQuantityMeters" min="0" max="10000000" step="0.01" required />

    <label class="req">Is meter under communication?</label>
    <select name="IsMeterUnderCommunication" id="commSel" required>
      <option value="">-- Select --</option><option>Yes</option><option>No</option>
    </select>

    <div id="nonCommWrap" class="hidden">
      <label class="req">Non-Communication reason</label>
      <textarea name="NonCommunicationReason" maxlength="300"></textarea>
      <div class="hint">Max 300 characters.</div>
    </div>

    <label class="req">Type of DTR</label>
    <select name="TypeOfDTR" required>
      <option value="">-- Select --</option>
      <option>AGL</option><option>Dedicated</option><option>Non-AGL</option>
    </select>

    <label class="req">Name of JE</label>
    <input name="NameOfJE" maxlength="100" required />

    <label class="req">Image of the Equipment (live photo)</label>
    <input type="file" id="photo" accept="image/*" capture="environment" required />
    <img id="photoPreview" alt="Preview" />
    <div class="hint">Camera will open. Please take a fresh photo of the equipment.</div>

    <div id="submitMsg"></div>
    <button type="submit" id="submitBtn" disabled>Submit</button>
  </form>
</div>

<script>
/* ============ CONFIG ============ */
const POWER_AUTOMATE_URL = "https://default04c72f56184846a281678e5d36510c.bc.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a7a0fc1a3bbc435c986f3710aeeb19f3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=CEEx4g8epPzzJ937f5r3e5zoDfJrrMkmCljVtMnALd8";
/* ================================ */

const CIRCLES = ["ALLURI SITHARAMARAJU","ANAKAPALLI","DR.B.R.AMBEDKAR KONASEEMA","EAST GODAVARI","ELURU","KAKINADA","PARVATHIPURAM MANYAM","SRIKAKULAM","VISAKHAPATNAM","VIZIANAGARAM","WEST GODAVARI"];

const DIVISIONS = ["AMALAPURAM","ANAKAPALLE","BHIMAVARAM","BOBBILI","CHIPURUPALLI","ELURU","JAGGAMPETA","JANGAREDDYGUDEM","KAKINADA","KASIMKOTA","NARSAPURAM","NARSIPATNAM","NIDADAVOLE","PADERU","PALAKONDA","PALASA","PARVATHIPURAM","PEDDAPURAM","RAJAMAHENDRAVARAM RURAL","RAJAMAHENDRAVARAM TOWN","RAMACHANDRAPURAM","RAMPACHODAVARAM","SRIKAKULAM","TADEPALLIGUDEM","TEKKALI","VISAKHAPATNAM ZONE-1","VISAKHAPATNAM ZONE-2","VISAKHAPATNAM ZONE-3","VIZIANAGARAM RURAL","VIZIANAGARAM TOWN"];

const SUBDIVISIONS = ["AGANAMPUDI","AKIVEEDU","AMADALAVALASA","AMALAPURAM","ANAKAPALLE","ANANDAPURAM","ANAPARTHY","ARAKU","ATCHUTHAPURAM","AUTONAGAR","BHEEMILI","BHIMADOLU","BHIMAVARAM","BHOGAPURAM","BOBBILI RURAL","BOBBILI TOWN","CHEBROLU","CHINTALAPUDI","CHINTAPALLI","CHINTOOR","CHIPURUPALLI","CHODAVARAM","DISTRIBUTION VSP","DONDAPARTHY","ELAMANCHILI","ELURU RURAL","ELURU TOWN","GAJAPATHINAGARAM","GAJUWAKA","GOPALAPATNAM","GOPALAPURAM","JAGGAMPETA","JANGAREDDYGUDEM","JEELUGUMILLI","JNPC-PARAWADA","KAKINADA RURAL","KAKINADA TOWN-1","KAKINADA TOWN-2","KAMAVARAPUKOTA","KANCHARAPALEM","KASIMKOTA","KORUKONDA","KOTABOMMALI","KOTHAPETA","KOVVURU","KOYYALAGUDEM","LANKELAPALEM","MADHURAWADA","MALKAPURAM","MANDAPETA","MUMMIDIVARAM","NALLAJERLA","NARASANNAPETA","NARSAPURAM","NARSIPATNAM RURAL","NARSIPATNAM TOWN","NIDADAVOLE","PADERU","PALAKOL RURAL","PALAKOL TOWN","PALAKONDA","PALASA","PARVATHIPURAM","PARVATHIPURAM ITDA","PATHAPATNAM","PAYAKARAO PETA","PEDAVEGI","PENDURTHI","PENUGONDA","PITHAPURAM","PRATHIPADU","RAJAM","RAJAMAHENDRAVARAM RURAL","RAJAMAHENDRAVARAM TOWN-1","RAJAMAHENDRAVARAM TOWN-2","RAMPACHODAVARAM","RAMPACHODAVARAM RURAL","RAZOLE","RCPURAM","S.KOTA","SABBAVARAM","SALURU","SAMALKOTA","SEETHAMMADHARA","SEETHAMPETA","SOMPETA","SRIKAKULAM RURAL","SRIKAKULAM TOWN","TADEPALLIGUDEM","TADEPALLIGUDEM-RURAL","TANUKU","TEKKALI","TUNI","VIZIANAGARAM TOWN-1","VIZIANAGARAM TOWN-2","WADDADI","WALTAIR"];

function fill(sel, arr){
  sel.innerHTML = '<option value="">-- Select --</option>' +
    arr.map(v => `<option>${v}</option>`).join('');
}
fill(document.querySelector('[name=Circle]'),      CIRCLES);
fill(document.querySelector('[name=Division]'),    DIVISIONS);
fill(document.querySelector('[name=SubDivision]'), SUBDIVISIONS);

/* Access-code show/hide + remember on device */
const codeInput = document.getElementById('accessCode');
const pwToggle  = document.getElementById('pwToggle');
pwToggle.addEventListener('click', () => {
  const isPwd = codeInput.type === 'password';
  codeInput.type = isPwd ? 'text' : 'password';
  pwToggle.textContent = isPwd ? 'Hide' : 'Show';
});
const savedCode = localStorage.getItem('dtrAccessCode');
if (savedCode) codeInput.value = savedCode;
codeInput.addEventListener('change', () => {
  localStorage.setItem('dtrAccessCode', codeInput.value.trim());
});

/* Conditional field */
const commSel = document.getElementById('commSel');
const wrap    = document.getElementById('nonCommWrap');
const ncta    = wrap.querySelector('textarea');
commSel.addEventListener('change', () => {
  const show = commSel.value === 'No';
  wrap.classList.toggle('hidden', !show);
  ncta.required = show;
  if (!show) ncta.value = '';
});

/* Geolocation — persistent re-prompting */
let geo = null;
let autoRetryTimer = null;
const locStatus   = document.getElementById('locStatus');
const submitBtn   = document.getElementById('submitBtn');
const retryLocBtn = document.getElementById('retryLocBtn');

function setLocMsg(cls, text) {
  locStatus.className = 'msg ' + cls;
  locStatus.textContent = text;
}
function showRetryBtn(show) {
  retryLocBtn.classList.toggle('hidden', !show);
}

function onLocSuccess(p) {
  geo = {
    lat: +p.coords.latitude.toFixed(6),
    lng: +p.coords.longitude.toFixed(6),
    acc: +p.coords.accuracy.toFixed(2)
  };
  setLocMsg('ok', `📍 Location captured: ${geo.lat}, ${geo.lng} (±${geo.acc} m)`);
  submitBtn.disabled = false;
  showRetryBtn(false);
  if (autoRetryTimer) { clearInterval(autoRetryTimer); autoRetryTimer = null; }
}

function onLocError(err) {
  geo = null;
  submitBtn.disabled = true;
  showRetryBtn(true);

  let msg = '';
  switch (err.code) {
    case 1:
      msg = '❌ Location permission denied. Tap the 🔒 icon in your browser address bar → Site settings → set Location to "Allow", then tap the button below.';
      break;
    case 2:
      msg = '❌ Cannot get location. Please turn ON your phone\'s GPS/Location service, then tap the button below.';
      break;
    case 3:
      msg = '⏳ Getting location is taking too long. Please move to an open area and tap the button below.';
      break;
    default:
      msg = '❌ Location error. Please enable GPS and browser permission, then tap the button below.';
  }
  setLocMsg('err', msg);

  if (!autoRetryTimer) {
    autoRetryTimer = setInterval(getLoc, 5000);
  }
}

function getLoc() {
  if (!navigator.geolocation) {
    setLocMsg('err', '❌ Geolocation not supported on this device. Cannot submit.');
    return;
  }
  if (!geo) setLocMsg('err', '📍 Requesting location…');
  navigator.geolocation.getCurrentPosition(
    onLocSuccess,
    onLocError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

retryLocBtn.addEventListener('click', getLoc);
getLoc();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !geo) {
    getLoc();
  }
});

/* Photo preview + compress */
const photoInput = document.getElementById('photo');
const preview    = document.getElementById('photoPreview');
let processedPhotoBase64 = null;
let processedPhotoName   = null;

photoInput.addEventListener('change', async () => {
  const f = photoInput.files[0];
  if (!f) return;

  const msgEl = document.getElementById('submitMsg');
  msgEl.className = 'msg';
  msgEl.textContent = '⏳ Processing photo…';

  try {
    const { dataUrl, base64, filename, sizeKb } = await processImage(f);
    preview.src = dataUrl;
    preview.style.display = 'block';
    processedPhotoBase64 = base64;
    processedPhotoName   = filename;
    msgEl.className = 'msg ok';
    msgEl.textContent = `✅ Photo ready (${sizeKb} KB).`;
  } catch (err) {
    processedPhotoBase64 = null;
    processedPhotoName   = null;
    msgEl.className = 'msg err';
    msgEl.textContent = '❌ Photo processing failed: ' + err.message;
  }
});

async function processImage(file) {
  const MAX_DIM = 1280;
  const QUALITY = 0.75;

  const dataUrl = await readAsDataURL(file);
  const img = await loadImage(dataUrl);

  let { width, height } = img;
  if (width === 0 || height === 0) throw new Error('Image has invalid dimensions (0x0)');

  if (width > MAX_DIM || height > MAX_DIM) {
    const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
    width  = Math.round(width  * ratio);
    height = Math.round(height * ratio);
  }

  const canvas = document.createElement('canvas');
  canvas.width  = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);
  ctx.drawImage(img, 0, 0, width, height);

  const blob = await new Promise((res, rej) => {
    canvas.toBlob(b => b ? res(b) : rej(new Error('Canvas toBlob failed')),
                  'image/jpeg', QUALITY);
  });

  if (blob.size < 1000) throw new Error('Processed image too small - likely corrupt');
  if (blob.size > 3 * 1024 * 1024) throw new Error('Processed image too large: ' + Math.round(blob.size/1024) + ' KB');

  const base64 = await blobToBase64(blob);
  const dataUrl2 = 'data:image/jpeg;base64,' + base64;
  const filename = 'photo_' + Date.now() + '.jpg';

  return { dataUrl: dataUrl2, base64, filename, sizeKb: Math.round(blob.size/1024) };
}

function readAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function loadImage(src) {
  return new Promise((res, rej) => {
    const im = new Image();
    im.onload  = () => res(im);
    im.onerror = rej;
    im.src = src;
  });
}
function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

/* Copy AESL code to clipboard */
function copyAeslCode(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copyAeslBtn');
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }
    });
  }
}

/* Submit */
const form = document.getElementById('surveyForm');
const msg  = document.getElementById('submitMsg');

form.addEventListener('submit', async e => {
  e.preventDefault();
  msg.innerHTML = '';
  msg.className = '';

  if (!geo) {
    alert('Location not captured yet. Please enable GPS/location permission and try again.');
    getLoc();
    return;
  }
  if (!photoInput.files[0] || !processedPhotoBase64) {
    alert('Please take a photo (or wait for it to finish processing).');
    return;
  }
  if (!form.checkValidity()) { form.reportValidity(); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  try {
    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());

    ['DTRRatingKVA','CableSizeSqmm','CableQuantityMeters'].forEach(k => {
      payload[k] = Number(payload[k]);
    });

    payload.Latitude  = geo.lat;
    payload.Longitude = geo.lng;
    payload.LocationAccuracyMeters = geo.acc;
    payload.CapturedAtUTC   = new Date().toISOString();
    payload.SubmissionRefId = 'DTR-' + Date.now() + '-' + Math.floor(Math.random() * 1000);

    payload.secret = codeInput.value.trim();
    delete payload.AccessCode;

    payload.PhotoBase64   = processedPhotoBase64;
    payload.PhotoFileName = 'photo_' + payload.SubmissionRefId + '.jpg';

    const resp = await fetch(POWER_AUTOMATE_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });

    if (resp.status === 401) {
      throw new Error('Invalid access code. Please check with your supervisor.');
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const data = await resp.json();
    const aeslCode = data.aeslDtCode || 'Pending';
    const refId    = data.refId || payload.SubmissionRefId;

    msg.className = '';
    msg.innerHTML = `
      <div class="success-box">
        <div>✅ <b>Submitted successfully!</b></div>
        <div style="margin-top:8px; font-size:13px; color:#555">Your AESL DT Code:</div>
        <div class="aesl-code">${aeslCode}</div>
        <div>
          <button type="button" id="copyAeslBtn" class="copy-btn"
                  onclick="copyAeslCode('${aeslCode}')">📋 Copy Code</button>
        </div>
        <div class="ref-id">Reference: ${refId}</div>
      </div>
    `;

    form.reset();
    codeInput.value = localStorage.getItem('dtrAccessCode') || '';
    preview.style.display = 'none';
    processedPhotoBase64 = null;
    processedPhotoName   = null;
    wrap.classList.add('hidden');
    getLoc();

    /* Scroll to success message */
    msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = '❌ Submission failed: ' + err.message;
  } finally {
    submitBtn.textContent = 'Submit';
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
